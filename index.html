<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apa nak makan tonight?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
    body { font-family: 'Fredoka', sans-serif; }
    @keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-shake { animation: shake 0.2s ease-in-out 2; }
  </style>
</head>
<body class="bg-gradient-to-br from-amber-400 via-rose-400 to-orange-500 min-h-screen flex flex-col items-center justify-center p-4 text-slate-800">
  <div id="card" class="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-2xl w-full max-w-sm text-center border-4 border-white transition-all transform hover:scale-[1.01] duration-300">
    <h1 class="text-3xl md:text-4xl font-extrabold mb-5 text-transparent bg-clip-text bg-gradient-to-r from-rose-600 via-orange-500 to-amber-500 filter drop-shadow-sm">Apa nak makan tonight?</h1>
    <input id="name-input" type="text" placeholder="Masukkan nama anda... ✏️" class="w-full text-center py-3.5 px-4 mb-4 border-2 border-slate-200 focus:border-rose-400 rounded-2xl font-bold text-lg outline-none transition-all placeholder:text-slate-400 placeholder:font-normal bg-slate-50/50 focus:bg-white" />
    <button id="pick-btn" onclick="pilih()" class="cursor-pointer w-full py-4 px-6 bg-gradient-to-r from-orange-500 to-rose-500 text-white font-bold text-xl rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all outline-none border-2 border-white select-none">Pilih untuk saya! 😋</button>
    <div id="result" class="mt-8 hidden">
      <div id="emoji" class="text-7xl mb-3 animate-bounce inline-block">🍛</div>
      <div class="text-xl font-bold text-slate-700 leading-snug">
        <span id="user-name" class="text-rose-600 font-extrabold">Nama</span> patut makan
        <span id="dish" class="block text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-rose-600 to-orange-500 mt-2 leading-tight">Nasi Lemak</span>
        hari ini!
      </div>
    </div>
  </div>
  <script>
    const dishes = [
      { n: "Nasi Lemak", e: "🍛" }, { n: "Roti Canai", e: "🫓" },
      { n: "Laksa", e: "🍜" }, { n: "Satay", e: "🍢" },
      { n: "Mee Goreng", e: "🍝" }, { n: "Cendol", e: "🍧" },
      { n: "Rendang", e: "🥩" }, { n: "Teh Tarik", e: "☕" },
      { n: "Mee Rebus", e: "🍜" }, { n: "Nasi Kerabu", e: "🍚" }
    ];
    function pilih() {
      const nameInp = document.getElementById('name-input'), name = nameInp.value.trim();
      if (!name) {
        nameInp.focus(); nameInp.classList.add('animate-shake'); nameInp.classList.add('border-rose-400');
        setTimeout(() => nameInp.classList.remove('animate-shake'), 400); return;
      }
      nameInp.classList.remove('border-rose-400');
      const res = document.getElementById('result'), btn = document.getElementById('pick-btn');
      res.classList.add('hidden'); res.classList.remove('animate-pop'); btn.disabled = true;
      let count = 0, interval = setInterval(() => {
        const temp = dishes[Math.floor(Math.random() * dishes.length)];
        document.getElementById('emoji').innerText = temp.e;
        document.getElementById('user-name').innerText = name;
        document.getElementById('dish').innerText = temp.n;
        res.classList.remove('hidden');
        if (++count > 10) {
          clearInterval(interval); btn.disabled = false;
          const final = dishes[Math.floor(Math.random() * dishes.length)];
          document.getElementById('emoji').innerText = final.e;
          document.getElementById('user-name').innerText = name;
          document.getElementById('dish').innerText = final.n;
          res.classList.add('animate-pop');
        }
      }, 70);
    }
  </script>
</body>
</html>
